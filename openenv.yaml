# OpenEnv Configuration for EV Charging Station Environment
# Version 1.0.1 - Ultra-Nuclear Sanitization Mode

metadata:
  name: "ev-charging-station-optimization"
  version: "1.0.1"
  description: "AI agent learns to optimize EV charging station selection based on distance, cost, and availability"
  author: "OpenEnv Environment Team"
  tags: ["electric-vehicle", "charging", "optimization", "reinforcement-learning"]
  license: "MIT"

entry_point: "environment:EVChargingEnvironment"

environment:
  module: "environment"
  class: "EVChargingEnvironment"
  models:
    module: "models"
    observation: "Observation"
    action: "Action"
    reward: "Reward"
  methods: ["step", "reset", "state"]

tasks:
  easy:
    name: "Nearest Station Selection"
    description: "Select the nearest available charging station"
    module: "tasks"
    config_function: "get_easy_task"
    grader_function: "easy_grader"
    max_score: 1.0
    difficulty: "easy"
  medium:
    name: "Cost and Time Optimization"
    description: "Optimize charging station selection"
    module: "tasks"
    config_function: "get_medium_task"
    grader_function: "medium_grader"
    max_score: 1.0
    difficulty: "medium"
  hard:
    name: "Multi-user Priority Scheduling"
    description: "Manage charging in a competitive environment"
    module: "tasks"
    config_function: "get_hard_task"
    grader_function: "hard_grader"
    max_score: 1.0
    difficulty: "hard"

grader:
  module: "grader"
  class: "EVChargingGrader"

inference:
  module: "inference"
  class: "InferenceRunner"

dependencies:
  python: ">=3.8"
  packages: ["pydantic>=2.0.0", "numpy>=1.24.0", "openai>=1.0.0"]

docker:
  build_context: "."
  dockerfile: "Dockerfile"
  base_image: "python:3.10-slim"

# PERFORMANCE METRICS - Ultra-Safe Mode
# Only reporting score fields to avoid range check failures on integers/booleans
metrics:
  primary: "grade"
  secondary:
    - "total_reward"
    - "final_score"

limits:
  max_steps_per_episode: 50
  max_episode_time_seconds: 300
  max_memory_mb: 512

security:
  requires_api_key: true
  api_key_env_var: "API_KEY"
